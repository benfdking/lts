version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: lts-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-setup:
    image: ollama/ollama:latest
    container_name: lts-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Pulling llama3.2 model..."
        ollama pull llama3.2
        echo "Model pulled successfully!"
    environment:
      - OLLAMA_HOST=ollama:11434

  demo:
    build:
      context: .
      dockerfile: Dockerfile.demo
    container_name: lts-demo
    depends_on:
      ollama-setup:
        condition: service_completed_successfully
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./demo-output:/demo/output
    command: sh -c "sleep 5 && vhs demo.tape && cp demo.gif output/"

volumes:
  ollama-data:
